scenario_id: scenario_01
name: "Checkout Latency Cascade"
description: >
  Payments DB connection pool exhausted under load spike, causing checkout
  queue backup and downstream notification timeouts.
speed: 1.0

services:
  - auth
  - payments
  - checkout
  - inventory
  - notifications

ground_truth:
  root_cause_service: payments
  causal_chain:
    - service: payments
      event: "DB connection pool exhausted (50/50 in use), query latency 20ms -> 4200ms"
    - service: checkout
      event: "order queue backs up waiting on payment confirmations, depth 5 -> 850"
    - service: notifications
      event: "downstream timeout waiting on checkout completion events, 30s timeout hit repeatedly"
  explanation: >
    Connection pool sized for 50 concurrent queries; a flash-sale traffic spike
    pushed concurrent payment requests to ~400. Pool exhaustion serialized
    queries, spiking payments latency 200x. Checkout blocked on payment
    confirms, queue depth exploded. Notifications timed out waiting on
    checkout completion events it never received in time.

logs:
