  - {service: auth,          t: 2,  level: INFO,  message: "token validated for session sess_8822"}
  - {service: payments,      t: 4,  level: INFO,  message: "connection pool: 22/50 in use"}
  - {service: checkout,      t: 5,  level: INFO,  message: "order ord_4472 queued, depth=6"}
  - {service: payments,      t: 8,  level: WARN,  message: "connection pool: 41/50 in use, latency rising to 380ms"}
  - {service: checkout,      t: 9,  level: INFO,  message: "order ord_4473 queued, depth=9"}
  - {service: payments,      t: 12, level: WARN,  message: "connection pool: 48/50 in use, queueing new requests"}
