scenario_id: scenario_03
name: "Inventory DB Network Partition"
description: >
  Network partition isolates the inventory database, triggering inventory
  service errors, checkout retry storms, and payments overload from
  retry-amplified traffic.
speed: 1.0

services:
  - inventory
  - checkout
  - payments
  - auth
  - notifications

ground_truth:
  root_cause_service: inventory
  causal_chain:
    - service: inventory
      event: "network partition isolates primary DB replica, query error rate 0% -> 91%"
    - service: checkout
      event: "aggressive retry-on-error policy triggers retry storm, request volume 3x -> 14x baseline"
    - service: payments
      event: "retry-amplified traffic overloads payment auth endpoint, latency and error rate spike"
  explanation: >
    A network partition (simulated top-of-rack switch failure) isolated the
    inventory service's primary DB replica from the app tier. Inventory query
    errors spiked to 91%. Checkout's retry-on-error policy had no backoff cap,
    so failed stock checks were retried aggressively, amplifying total request
    volume 14x baseline. That amplified volume hit the payments service's
    shared auth-check endpoint, overloading it and causing unrelated-looking
    payment latency spikes that were actually a downstream symptom of the
    inventory partition.

logs:
