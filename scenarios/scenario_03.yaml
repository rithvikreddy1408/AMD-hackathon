  - {service: checkout,      t: 1,  level: INFO,  message: "order ord_2201 stock check ok"}
  - {service: inventory,     t: 4,  level: ERROR, message: "DB replica primary-1 connection timeout, network unreachable"}
  - {service: checkout,      t: 5,  level: WARN,  message: "stock check failed for ord_2202, retrying (attempt 1)"}
  - {service: inventory,     t: 6,  level: ERROR, message: "DB replica primary-1 still unreachable, error rate 34%"}
  - {service: checkout,      t: 7,  level: WARN,  message: "stock check failed for ord_2202, retrying (attempt 2)"}
  - {service: checkout,      t: 8,  level: WARN,  message: "stock check failed for ord_2203, retrying (attempt 1)"}
  - {service: inventory,     t: 9,  level: ERROR, message: "DB replica primary-1 unreachable, error rate 67%, no failover configured"}
  - {service: checkout,      t: 10, level: ERROR, message: "retry volume 14x baseline, retry storm detected"}
  - {service: payments,      t: 12, level: WARN,  message: "auth-check endpoint latency rising, 40ms -> 620ms"}
  - {service: inventory,     t: 13, level: ERROR, message: "DB replica primary-1 unreachable, error rate 91%"}
  - {service: payments,      t: 15, level: ERROR, message: "auth-check endpoint overloaded, latency 2400ms, error rate 22%"}
  - {service: checkout,      t: 17, level: ERROR, message: "orders ord_2202-ord_2240 stalled, retry storm ongoing"}
  - {service: auth,          t: 19, level: INFO,  message: "token issuance nominal, no anomalies on auth side"}
